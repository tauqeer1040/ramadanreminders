<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meowmin Ai Diary</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0D0D1A;
      color: #C8C8D4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #9B6BFF, #6A00FF);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin-bottom: 24px;
    }
    h1 {
      color: #FFFFFF;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    p {
      max-width: 480px;
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 6px;
    }
    .links {
      margin-top: 32px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .links a {
      color: #9B6BFF;
      font-size: 14px;
      text-decoration: underline;
    }
    .footer {
      margin-top: 48px;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="logo">🌙</div>
  <h1>Meowmin</h1>
  <p>Your AI-powered Ramadan journal companion.</p>
  <p style="font-size:14px; color:#888;">Reflect. Connect. Grow.</p>

  <div class="links">
    <a href="/privacy.html">Privacy Policy</a>
  </div>

  <div class="footer">Made with ❤️</div>
</body>
</html>
